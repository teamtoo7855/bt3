<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>bt3</title>
  <style>
    :root{
      --bg:#f4f6f9;
      --card:#ffffff;
      --text:#111827;
      --muted:#6b7280;
      --border:#e5e7eb;
      --primary:#007cbf;
      --primary2:#005f91;
      --danger:#b91c1c;
      --success:#047857;
      --shadow:0 10px 30px rgba(0,0,0,.10);
      --radius:14px;
    }
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:var(--text);}
    .wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
    .card{width:min(520px,100%);background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:22px;}
    h1,h2{margin:0 0 10px 0;}
    p{margin:8px 0;color:var(--muted);}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
    label{display:block;font-size:13px;color:var(--muted);margin:8px 0 4px;}
    input,select{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:10px;font-size:14px;outline:none;background:white;}
    input:focus,select:focus{border-color:#93c5fd;box-shadow:0 0 0 3px rgba(59,130,246,.15);}
    .btnbar{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap;}
    button,.btn{
      appearance:none;border:0;border-radius:10px;padding:10px 12px;
      background:var(--primary);color:white;font-weight:600;cursor:pointer;font-size:14px;
      text-decoration:none;display:inline-flex;align-items:center;justify-content:center;
    }
    button:hover,.btn:hover{background:var(--primary2);}
    .btn.secondary{background:#111827;}
    .btn.secondary:hover{background:#0b1220;}
    .btn.ghost{background:transparent;color:var(--text);border:1px solid var(--border);}
    .btn.ghost:hover{background:#f9fafb;}
    .pill{display:inline-block;padding:6px 10px;border-radius:999px;border:1px solid var(--border);font-size:12px;color:var(--muted);background:#fafafa;}
    .divider{height:1px;background:var(--border);margin:14px 0;}
    .flashes{list-style:none;padding:0;margin:0 0 12px 0;display:grid;gap:8px;}
    .flashes li{padding:10px 12px;border-radius:10px;border:1px solid var(--border);background:#fafafa;}
    .flashes .Success{border-color:rgba(4,120,87,.25);background:rgba(4,120,87,.08);color:var(--success);}
    .flashes .Error{border-color:rgba(185,28,28,.25);background:rgba(185,28,28,.08);color:var(--danger);}
    .footerlink{margin-top:10px;font-size:14px;}
    .footerlink a{color:var(--primary);text-decoration:none;}
    .footerlink a:hover{text-decoration:underline;}
    @media (max-width:520px){ .row{grid-template-columns:1fr;} }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          <ul class="flashes">
            {% for category, message in messages %}
              <li class="{{ category }}">{{ message }}</li>
            {% endfor %}
          </ul>
        {% endif %}
      {% endwith %}
      {% block body %}{% endblock %}
    </div>
  </div>
</body>
</html>
