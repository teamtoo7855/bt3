{% extends "layout.html" %}
{% block body %}

<h2>Sign in to bt3</h2>
<p>Track buses live, check ETAs, and save your preferences.</p>

<form method="post" action="/login">
  <label>Email</label>
  <input type="email" name="email" placeholder="you@example.com" required>

  <label>Password</label>
  <input type="password" name="password" placeholder="••••••••" required>

  <div class="btnbar">
    <button type="submit">Sign In</button>
    <a class="btn ghost" href="/signup">Create account</a>
  </div>
</form>

<div class="divider"></div>

<p><span class="pill">Demo</span> No account needed. Explore the map as a guest.</p>
<form method="post" action="/demo">
  <div class="btnbar">
    <button type="submit" class="btn secondary">Continue as Guest</button>
  </div>
</form>

{% endblock %}
