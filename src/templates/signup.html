{% extends "layout.html" %}
{% block body %}
  <h1>Signup</h1>
  {% if error %}
    <p class=error><strong>Error:</strong> {{ error }}
  {% endif %}
  <form method=post>
    <dl>
      <dt>Email:
      <dd><input type=text name=email value="{{
          request.form.email }}">
      <dt>Password:
      <dd><input type=password name=password>
      <dt>Confirm:
      <dd><input type=password name=password_confirm>
    </dl>
    <p><input type=submit value=Submit>
  </form>
{% endblock %}
