{% extends "layout.html" %}
{% block body %}

<!-- Map container -->
<div id="map"></div>

<style>
  body {
    margin: 0;
  }

  #map {
    filter: blur(1px);
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    z-index: -2;
  }
</style>

<h2>Create your bt3 account</h2>
<p>Sign up and set a few preferences (optional) so you don’t re-enter them later.</p>

<form method="post" action="/signup">
  <label>Email</label>
  <input type="email" name="email" placeholder="you@example.com" required>

  <div class="row">
    <div>
      <label>Password</label>
      <input type="password" name="password" placeholder="min 8 characters" required>
    </div>
    <div>
      <label>Confirm Password</label>
      <input type="password" name="password_confirm" placeholder="retype password" required>
    </div>
  </div>

  <div class="divider"></div>
  <p><span class="pill">Preferences</span> Optional (you can change these later)</p>

  <div class="row">
    <div>
      <label>Most-used route</label>
      <input type="text" name="favorite_route" placeholder="e.g. 106">
    </div>
    <div>
      <label>Preferred bus type</label>
      <select name="favorite_type">
        <option value="">No preference</option>
        <option>dark-v11</option>
        <option>Articulated</option>
        <option>Electric</option>
        <option>Community Shuttle</option>
        <option>Trolley</option>
      </select>
    </div>
  </div>

  <div class="row">
    <div>
      <label>Theme</label>
      <select name="theme">
        <option value="">Default</option>
        <option>Light</option>
        <option>Dark</option>
      </select>
    </div>
    <div>
      <label>Alerts</label>
      <select name="alerts">
        <option value="">Default</option>
        <option value="on">Enabled</option>
        <option value="off">Disabled</option>
      </select>
    </div>
  </div>

  <label>Favorite stop (optional)</label>
  <input type="text" name="favorite_stop" placeholder="Stop code, e.g. 56934">

  <div class="btnbar">
    <button type="submit">Create Account</button>
    <a class="btn ghost" href="/login">Back to login</a>
  </div>
</form>

<!-- Mapbox -->
<script src="https://api.mapbox.com/mapbox-gl-js/v3.18.1/mapbox-gl.js"></script>
<link href="https://api.mapbox.com/mapbox-gl-js/v3.18.1/mapbox-gl.css" rel="stylesheet" />

<script>
mapboxgl.accessToken = "{{key}}";

const map = new mapboxgl.Map({
  container: "map",
  style: "mapbox://styles/mapbox/dark-v11",
  center: [-122.995, 49.266],
  zoom: 15.7,
  pitch: 60,
  bearing: -20,
  antialias: true,
  interactive: false
});

map.on("load", () => {
  map.addLayer(
    {
      id: "3d-buildings",
      source: "composite",
      "source-layer": "building",
      filter: ["==", "extrude", "true"],
      type: "fill-extrusion",
      paint: {
        "fill-extrusion-color": "#aaa",
        "fill-extrusion-height": ["get", "height"],
        "fill-extrusion-base": ["get", "min_height"],
        "fill-extrusion-opacity": 0.8
      }
    });
});
</script>

{% endblock %}
