<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Bus Map + 3D Buildings</title>

  <script src="https://api.mapbox.com/mapbox-gl-js/v3.18.1/mapbox-gl.js"></script>
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.18.1/mapbox-gl.css" rel="stylesheet" />

  <style>
    body { margin: 0; }
    #map { width: 100vw; height: 100vh; }
  </style>
</head>
<body>
  <!--from https://docs.mapbox.com/mapbox-gl-js/example/standard-interactions/-->
  <style>
    .map-overlay {
        position: absolute;
        right: 0;
        top: 0;
        width: 230px;
        padding: 10px;
        color: #1a2224;
        font: 12px/20px sans-serif;
        display: none;
    }

    .map-overlay-inner {
        background: #fff;
        padding: 10px;
        border-radius: 3px;
    }
  </style>

<div style="position:absolute;z-index:2;top:12px;left:12px;background:white;padding:8px 10px;border-radius:8px;font-family:sans-serif;box-shadow:0 1px 6px rgba(0,0,0,0.2);">
  <button id="locBtn">Use my location</button>
  <span id="locStatus" style="margin-left:8px;font-size:12px;"></span>
</div>

<div style="position:absolute;z-index:2;top:60px;left:12px;background:white;padding:8px 10px;border-radius:8px;font-family:sans-serif;box-shadow:0 1px 6px rgba(0,0,0,0.2);">
  <label>Stop</label>
  <input id="stopInput" type="text" style="width:90px;margin-left:6px;">
  <label style="margin-left:8px;">Bus</label>
  <input id="busInput" type="text" style="width:70px;margin-left:6px;">
  <button id="etaBtn" style="margin-left:8px;">Get ETA</button>
  <span id="etaStatus" style="margin-left:8px;font-size:12px;"></span>
</div>

<div id="map"></div>
<div class="map-overlay" id="properties"></div>

<script>
  //generated webpage above

  //mapbox key
mapboxgl.accessToken = "{{key}}";

//define map box map with center being based on Burnaby
const map = new mapboxgl.Map({
  container: "map",
  style: "mapbox://styles/mapbox/standard",
  config: {
    basemap: {
      showTransitLabels: false
    }
  },
  center: [-122.98, 49.25],
  zoom: 12,
  pitch: 60,
  bearing: -20,
  antialias: true
});

//generate objects on load
map.on("load", () => {

  // -----------------------------
  // Add GTFS Bus Positions Layer
  // -----------------------------
  map.addSource("buses", {
    type: "geojson",
    data: "/vehicles.geojson"
  });

  map.addLayer({
    id: "bus-points",
    type: "circle",
    source: "buses",
    paint: {
      "circle-radius": 7,
      "circle-color": "#007cbf",
      "circle-stroke-width": 3,
      "circle-stroke-color": "#ffffff"
    }
  });

  map.addSource("stops", {
    type: "geojson",
    data: "/stops.geojson"
  });

  map.addLayer({
    id: "stop-points",
    type: "circle",
    source: "stops",
    minzoom: 15,
    paint: {
      "circle-radius": 7,
      "circle-color": "#ec5277",
      "circle-stroke-width": 3,
      "circle-stroke-color": "#ffffff"
    }
  });

  map.addSource("user", {
    type: "geojson",
    data: {
      "type": "FeatureCollection",
      "features": []
    }
  });

  map.addLayer({
    id: "user-point",
    type: "circle",
    source: "user",
    paint: {
      "circle-radius": 8,
      "circle-color": "#ff0000",
      "circle-stroke-width": 3,
      "circle-stroke-color": "#ffffff"
    }
  });

  const popup = new mapboxgl.Popup({
    closeButton: false,
    closeOnClick: false
  });

  map.addInteraction('places-mouseenter-interaction', {
    type: 'mouseenter',
    target: { layerId: 'bus-points' },
    handler: (e) => {
      map.getCanvas().style.cursor = 'pointer';
      const coordinates = e.feature.geometry.coordinates.slice();
      const description = e.feature.properties.vehicle_name;
      // popup.setLngLat(coordinates).setHTML(description).addTo(map);

      map.addSource("hover-route", {
        type: "geojson",
        data: `/api/shape?trip_id=${e.feature.properties.trip_id}&direction=${e.feature.properties.direction}`
      });


      map.addLayer({
        id: "hover-layer",
        type: "line",
        source: "hover-route",
        layout: {
            'line-join': 'round',
            'line-cap': 'round'
        },
        paint: {
            'line-color': '#888',
            'line-width': 8
        }
      });
    }
  });

  // clear popup when mouse no longer hovering
  map.addInteraction('places-mouseleave-interaction', {
      type: 'mouseleave',
      target: { layerId: 'bus-points' },
      handler: () => {
          map.getCanvas().style.cursor = '';
          // popup.remove();
          map.removeLayer('hover-layer')
          map.removeSource('hover-route')
      }
  });

  // show popup on click, from https://docs.mapbox.com/mapbox-gl-js/example/standard-interactions/

  let selectedPlace;

  const card = document.getElementById('properties');
  const showCard = (feature) => {
      const state = Object.entries(map.getFeatureState(feature))
          .map(([key, value]) => `<li><b>${key}</b>: ${value}</li>`)
          .join('');

      const properties = Object.entries(feature.properties)
          .map(([key, value]) => `<li><b>${key}</b>: ${value}</li>`)
          .join('');

      card.innerHTML = `
              <div class="map-overlay-inner">
                  <!-- <b>featureset</b>: <code>${feature.target.featuresetId}</code><br> -->
                  <b>feature state</b>: <code>${state}</code>
                  <hr><b>Properties</b>
                  ${properties}
              </div>`;

      card.style.display = 'block';
  };

  map.addInteraction('stop-click', {
  type: 'click',
  target: {layerId: 'stop-points'},
  handler: ({ feature }) => {
      if (selectedPlace) {
          map.setFeatureState(selectedPlace, { select: false });
      }
      selectedPlace = feature;
      map.setFeatureState(feature, { select: true });
      showCard(feature);
  }
  });

  map.addInteraction('map-click', {
    type: 'click',
    handler: () => {
        if (selectedPlace) {
            map.setFeatureState(selectedPlace, { select: false });
            selectedPlace = null;
        }
        card.style.display = 'none';
        return false;
    }
  });

  // Auto-refresh buses every .1 seconds
  setInterval(() => {
    map.getSource("buses").setData("/vehicles.geojson");
  }, 1000);

  // -----------------------------
  // Enable 3D Buildings
  // -----------------------------

  const layers = map.getStyle().layers;
  let labelLayerId;

  for (const layer of layers) {
    if (layer.type === "symbol" && layer.layout["text-field"]) {
      labelLayerId = layer.id;
      break;
    }
  }

  map.addLayer(
    {
      id: "3d-buildings",
      source: "composite",
      "source-layer": "building",
      filter: ["==", "extrude", "true"],
      type: "fill-extrusion",
      minzoom: 15,
      paint: {
        "fill-extrusion-color": "#aaa",
        "fill-extrusion-height": ["get", "height"],
        "fill-extrusion-base": ["get", "min_height"],
        "fill-extrusion-opacity": 0.6
      }
    },
    labelLayerId
  );

});

const locBtn = document.getElementById("locBtn");
const locStatus = document.getElementById("locStatus");

async function sendUserLocation(lat, lon) {
  const res = await fetch("/api/location/user", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ lat, lon })
  });
  return res.json();
}

locBtn.onclick = () => {
  if (!navigator.geolocation) {
    locStatus.textContent = "Geolocation not supported";
    return;
  }

  locStatus.textContent = "Requesting permission...";

  navigator.geolocation.getCurrentPosition(async (pos) => {
    const lat = pos.coords.latitude;
    const lon = pos.coords.longitude;

    map.getSource("user").setData({
      "type": "FeatureCollection",
      "features": [{
        "type": "Feature",
        "geometry": { "type": "Point", "coordinates": [lon, lat] },
        "properties": {}
      }]
    });

    map.flyTo({ center: [lon, lat], zoom: 14 });

    try {
      const data = await sendUserLocation(lat, lon);
      locStatus.textContent = (data && data.ok) ? "Location saved" : "Server error";
    } catch (e) {
      locStatus.textContent = "Send failed";
      console.log(e);
    }
  }, (err) => {
    locStatus.textContent = "Denied/error: " + err.message;
  }, {
    enableHighAccuracy: true,
    timeout: 10000,
    maximumAge: 30000
  });
};

const stopInput = document.getElementById("stopInput");
const busInput = document.getElementById("busInput");
const etaBtn = document.getElementById("etaBtn");
const etaStatus = document.getElementById("etaStatus");

etaBtn.onclick = async () => {
  const stopId = stopInput.value.trim();
  const busNum = busInput.value.trim();

  if (!stopId || !busNum) {
    etaStatus.textContent = "Enter stop and bus";
    return;
  }

  etaStatus.textContent = "Loading...";

  try {
    const url = `/api/next_arrival?stop_id=${encodeURIComponent(stopId)}&bus_number=${encodeURIComponent(busNum)}`;
    const res = await fetch(url);
    const data = await res.json();

    if (data.error) {
      etaStatus.textContent = data.error;
      return;
    }

    if (!data.next_arrival) {
      etaStatus.textContent = "No arrival found";
      return;
    }

    etaStatus.textContent = `${data.next_arrival.eta_minutes} min`;
  } catch (e) {
    etaStatus.textContent = "Request failed";
    console.log(e);
  }
};
</script>

</body>
</html>
