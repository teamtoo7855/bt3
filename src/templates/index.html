<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Bus Map + 3D Buildings</title>

  <script src="https://api.mapbox.com/mapbox-gl-js/v3.18.1/mapbox-gl.js"></script>
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.18.1/mapbox-gl.css" rel="stylesheet" />

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body { margin: 0; }
    #map { width: 100vw; height: 100vh; }
  </style>
</head>
<body>

<div id="controlPanel" style="position:absolute;z-index:3;top:12px;left:12px;">

  <div style="background:white;padding:6px 10px;border-radius:8px 8px 0 0;
              font-family:sans-serif;box-shadow:0 1px 6px rgba(0,0,0,0.2);
              display:flex;justify-content:space-between;align-items:center;">
    <button id="togglePanel" style="font-size:12px;">–</button>
  </div>

  <div id="panelBody">

    <div style="background:white;padding:8px 10px;font-family:sans-serif;
                box-shadow:0 1px 6px rgba(0,0,0,0.2);">
      <button id="locBtn">Use my location</button>
      <span id="locStatus" style="margin-left:8px;font-size:12px;"></span>
    </div>

    <div style="background:white;padding:8px 10px;font-family:sans-serif;
                box-shadow:0 1px 6px rgba(0,0,0,0.2);">
      <label>Stop</label>
      <input id="stopInput" type="text" style="width:90px;margin-left:6px;">
      <label style="margin-left:8px;">Bus</label>
      <input id="busInput" type="text" style="width:70px;margin-left:6px;">
      <button id="etaBtn" style="margin-left:8px;">Get ETA</button>
      <span id="etaStatus" style="margin-left:8px;font-size:12px;"></span>
    </div>

    <div style="background:white;padding:8px 10px;border-radius:0 0 8px 8px;
                font-family:sans-serif;box-shadow:0 1px 6px rgba(0,0,0,0.2);">
      <button id="profileBtn">Edit Profile</button>
      <button id="logoutBtn" style="margin-left:8px;">Logout</button>
    </div>

  </div>
</div>

<div id="map"></div>
<div class="map-overlay" id="properties"></div>

<div id="chartPanel" style="display:none;position:absolute;z-index:3;right:12px;bottom:24px;width:340px;height:400px;background:white;padding:16px;border-radius:10px;font-family:sans-serif;box-shadow:0 1px 6px rgba(0,0,0,0.2);">
  <div style="font-weight:600;margin-bottom:0px;">Buses on Route</div>
  <canvas id="busChart"></canvas>
</div>

<script>
  //generated webpage above

  //mapbox key
mapboxgl.accessToken = "{{key}}";

//define map box map with center being based on Burnaby
const map = new mapboxgl.Map({
  container: "map",
  style: "mapbox://styles/mapbox/standard",
  config: {
    basemap: {
      showTransitLabels: false
    }
  },
  center: [-122.98, 49.25],
  zoom: 12,
  pitch: 60,
  bearing: -20,
  antialias: true
});

//generate objects on load
map.on("load", () => {

  // -----------------------------
  // Add GTFS Bus Positions Layer
  // -----------------------------
  map.addSource("buses", {
    type: "geojson",
    data: "/vehicles.geojson"
  });

  map.addLayer({
    id: "bus-points",
    type: "circle",
    source: "buses",
    paint: {
      "circle-radius": 7,
      "circle-color": "#007cbf",
      "circle-stroke-width": 3,
      "circle-stroke-color": "#ffffff"
    }
  });

  map.addSource("stops", {
    type: "geojson",
    data: "/stops.geojson"
  });

  map.addLayer({
    id: "stop-points",
    type: "circle",
    source: "stops",
    minzoom: 15,
    paint: {
      "circle-radius": 7,
      "circle-color": "#ec5277",
      "circle-stroke-width": 3,
      "circle-stroke-color": "#ffffff"
    }
  });

  map.addSource("user", {
    type: "geojson",
    data: {
      "type": "FeatureCollection",
      "features": []
    }
  });

  map.addLayer({
    id: "user-point",
    type: "circle",
    source: "user",
    paint: {
      "circle-radius": 8,
      "circle-color": "#ff0000",
      "circle-stroke-width": 3,
      "circle-stroke-color": "#ffffff"
    }
  });

  const popup = new mapboxgl.Popup({
    closeButton: false,
    closeOnClick: false
  });
  //create a timeout
  let hoverTimeout
  map.addInteraction('places-mouseenter-interaction', {
    type: 'mouseenter',
    // if bus points on map are selected
    target: { layerId: 'bus-points' },
    handler: (e) => {
      //turn cursor into pointer variant
      map.getCanvas().style.cursor = 'pointer';
      clearTimeout(hoverTimeout);
      hoveredRoute = {
        route_id: e.feature.properties.route_id
      };
      //within a timeout process (for request limiting)
      hoverTimeout = setTimeout(() =>{
        //currently obsolete
        const description = e.feature.properties.vehicle_name;
        // popup.setLngLat(coordinates).setHTML(description).addTo(map);
        // get link to be requested for bus routes
        const url = `/api/shape?trip_id=${e.feature.properties.trip_id}&direction=${e.feature.properties.direction_id}`;
        //if hover route has already been created
        if (map.getSource("hover-route")){
        //grab info from the url
          map.getSource("hover-route").setData(url);
        }
        //otherwise add hover route of geojson type with the previous included url
        else {
          map.addSource("hover-route", {
          type: "geojson",
          data: url
          });

          //add line layers with specified colours
          map.addLayer({
            id: "hover-layer",
            type: "line",
            source: "hover-route",
            layout: {
                'line-join': 'round',
                'line-cap': 'round'
            },
            paint: {
                'line-color': '#888',
                'line-width': 8
            }
          });
        }
        //add a time delay before routes are registeredd
      }, 100);
    }

  });

  // clear popup when mouse no longer hovering
  map.addInteraction('places-mouseleave-interaction', {
      type: 'mouseleave',
      target: { layerId: 'bus-points' },
      handler: () => {
          map.getCanvas().style.cursor = '';
          hoveredRoute= null;
          // popup.remove();
          if (map.getLayer('hover-layer')) map.removeLayer('hover-layer');
          if (map.getSource('hover-route')) map.removeSource('hover-route');

          updateBusChart();
      }
  });

  // show popup on click, from https://docs.mapbox.com/mapbox-gl-js/example/standard-interactions/

  let selectedPlace;

  const card = document.getElementById('properties');
  const showCard = (feature) => {
      card.innerHTML = `
              <div class="map-overlay-inner">
                  <b>${feature.properties.stop_name}</b>
                  <hr><b>About This Stop</b>
                  <br><b>Stop Number</b>: ${feature.properties.stop_code}</p>
              </div>`;

      card.style.display = 'block';
  };

  map.addInteraction('stop-click', {
  type: 'click',
  target: {layerId: 'stop-points'},
  handler: ({ feature }) => {
      if (selectedPlace) {
          map.setFeatureState(selectedPlace, { select: false });
          map.removeLayer('sel-route')
          map.removeSource('route')
      }
      selectedPlace = feature;
      map.setFeatureState(feature, { select: true });
      showCard(feature);

      map.addSource("route", {
        type: "geojson",
        data: `/api/shape?stop_id=${feature.properties.stop_id}`
      });

      map.addLayer({
        id: "sel-route",
        type: "line",
        source: "route",
        layout: {
            'line-join': 'round',
            'line-cap': 'round'
        },
        paint: {
            'line-color': '#888',
            'line-width': 8
        }
      });
  }
  });

  map.addInteraction('map-click', {
    type: 'click',
    handler: () => {
        if (selectedPlace) {
            map.setFeatureState(selectedPlace, { select: false });
            map.removeLayer('sel-route')
            map.removeSource('route')
            selectedPlace = null;
        }
        card.style.display = 'none';
        return false;
    }
  });

  // Auto-refresh buses every .5 seconds
  setInterval(() => {
    map.getSource("buses").setData("/vehicles.geojson");
    if (hoveredRoute) {
      map.once("idle", updateBusChart);
    }
  }, 5000);

  // -----------------------------
  // Enable 3D Buildings
  // -----------------------------

  const layers = map.getStyle().layers;
  let labelLayerId;

  for (const layer of layers) {
    if (layer.type === "symbol" && layer.layout["text-field"]) {
      labelLayerId = layer.id;
      break;
    }
  }

  map.addLayer(
    {
      id: "3d-buildings",
      source: "composite",
      "source-layer": "building",
      filter: ["==", "extrude", "true"],
      type: "fill-extrusion",
      minzoom: 15,
      paint: {
        "fill-extrusion-color": "#aaa",
        "fill-extrusion-height": ["get", "height"],
        "fill-extrusion-base": ["get", "min_height"],
        "fill-extrusion-opacity": 0.6
      }
    },
    labelLayerId
  );

  updateBusChart();
});

const locBtn = document.getElementById("locBtn");
const locStatus = document.getElementById("locStatus");
let busChart = null;
let hoveredRoute = null;

function updateBusChart() {
  try {
    const canvas = document.getElementById("busChart");
    const panel = document.getElementById("chartPanel");

    if (!canvas || !panel) return;

    const ctx = canvas.getContext("2d");

    // Only show chart while a hover route is active
    if (!hoveredRoute || !map.getSource("hover-route")) {
      panel.style.display = "none";

      if (busChart) {
        busChart.destroy();
        busChart = null;
      }
      return;
    }

    // Use currently rendered buses, then keep only same route_id
    const rendered = map.queryRenderedFeatures({ layers: ["bus-points"] });
    const counts = {};

    for (const feature of rendered) {
      const props = feature.properties || {};
      if (String(props.route_id) !== String(hoveredRoute.route_id)) continue;

      const name = props.vehicle_name || "Unknown";
      counts[name] = (counts[name] || 0) + 1;
    }

    const labels = Object.keys(counts);
    const values = Object.values(counts);

    if (busChart) {
      busChart.destroy();
      busChart = null;
    }

    if (!labels.length) {
      panel.style.display = "none";
      return;
    }

    panel.style.display = "block";

    busChart = new Chart(ctx, {
      type: "pie",
      data: {
        labels,
        datasets: [{
          data: values
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: {
            position: "bottom"
          }
        }
      }
    });
  } catch (e) {
    console.log(e);
  }
}
async function sendUserLocation(lat, lon) {
  const res = await fetch("/api/location/user", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ lat, lon })
  });
  return res.json();
}

locBtn.onclick = () => {
  if (!navigator.geolocation) {
    locStatus.textContent = "Geolocation not supported";
    return;
  }

  locStatus.textContent = "Requesting permission...";

  navigator.geolocation.getCurrentPosition(async (pos) => {
    const lat = pos.coords.latitude;
    const lon = pos.coords.longitude;

    map.getSource("user").setData({
      "type": "FeatureCollection",
      "features": [{
        "type": "Feature",
        "geometry": { "type": "Point", "coordinates": [lon, lat] },
        "properties": {}
      }]
    });

    map.flyTo({ center: [lon, lat], zoom: 14 });

    try {
      const data = await sendUserLocation(lat, lon);
      locStatus.textContent = (data && data.ok) ? "Location saved" : "Server error";
    } catch (e) {
      locStatus.textContent = "Send failed";
      console.log(e);
    }
  }, (err) => {
    locStatus.textContent = "Denied/error: " + err.message;
  }, {
    enableHighAccuracy: true,
    timeout: 10000,
    maximumAge: 30000
  });
};
//profile and logout buttons
const profileBtn = document.getElementById("profileBtn");
const logoutBtn = document.getElementById("logoutBtn");

// Redirect to profile edit page
profileBtn.onclick = () => {
  window.location.href = "/profile";
};

// Logout (adjust endpoint if needed)
logoutBtn.onclick = async () => {
  await fetch("/logout", {
    method: "POST"
  });

  window.location.href = "/login";
};
const stopInput = document.getElementById("stopInput");
const busInput = document.getElementById("busInput");
const etaBtn = document.getElementById("etaBtn");
const etaStatus = document.getElementById("etaStatus");

etaBtn.onclick = async () => {
  const stopId = stopInput.value.trim();
  const busNum = busInput.value.trim();

  if (!stopId || !busNum) {
    etaStatus.textContent = "Enter stop and bus";
    return;
  }

  etaStatus.textContent = "Loading...";

  try {
    const url = `/api/next_arrival?stop_id=${encodeURIComponent(stopId)}&bus_number=${encodeURIComponent(busNum)}`;
    const res = await fetch(url);
    const data = await res.json();

    if (data.error) {
      etaStatus.textContent = data.error;
      return;
    }

    if (!data.next_arrival) {
      etaStatus.textContent = "No arrival found";
      return;
    }

    etaStatus.textContent = `${data.next_arrival.eta_minutes} min`;
  } catch (e) {
    etaStatus.textContent = "Request failed";
    console.log(e);
  }
};

const toggleBtn = document.getElementById("togglePanel");
const panelBody = document.getElementById("panelBody");

toggleBtn.onclick = () => {
  const isHidden = panelBody.style.display === "none";
  panelBody.style.display = isHidden ? "block" : "none";
  toggleBtn.textContent = isHidden ? "–" : "+";
};
</script>

</body>
</html>
