<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Error {{ status_code }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f6f7fb;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: #333;
        }

        .container {
            text-align: center;
            max-width: 800px;
            padding: 2rem;
            background: white;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }

        h1 {
            font-size: 5rem;
            margin: 0;
            color: #e74c3c;
        }

        p {
            margin: 0.5rem 0;
            font-size: 1.5rem;
            color: #72737a;
        }

        a {
            display: inline-block;
            margin-top: 3rem;
            padding: 0.7rem 1.2rem;
            text-decoration: none;
            background: #3498db;
            color: white;
            border-radius: 6px;
        }

        a:hover {
            background: #2674a9;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>{{ status_code }}</h1>
        <p>
            {{ error_message if error_message else "Please try again." }}
        </p>
        <a href="{{ url_for('dashboard.home') }}">Return to Home</a>
    </div>
</body>
</html>
