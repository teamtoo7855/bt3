name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv pip install --system .

      - name: Install test tools
        run: uv pip install --system pytest pytest-cov

      - name: Run tests
        env:
          PYTHONPATH: src
        run: pytest src/tests --cov=src --cov-report=term-missing